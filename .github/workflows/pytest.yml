---
name: pytest

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_COLOR: 1

jobs:
  test:
    name: GAP
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash -l {0}

    steps:
    - uses: actions/checkout@v6

    - uses: mamba-org/setup-micromamba@v3
      with:
        environment-file: environment.yml
        environment-name: gha-test-env
        cache-environment: true

    - name: Basic install
      run: ./install_gap.sh

    - name: Test basic install
      run: pytest --cov=mlptrain -k "not test_openmm"

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v6
      with:
          flags: gap
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: duartegroup/mlp-train

  test-ace:
    name: ACE
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash -l {0}

    steps:
    - uses: actions/checkout@v6

    - uses: julia-actions/setup-julia@v2
      with:
        version: '1.6'

    - uses: mamba-org/setup-micromamba@v3
      with:
        environment-file: environment_ace.yml
        environment-name: gha-test-env
        cache-environment: true

    - name: ACE install
      run: ./install_ace.sh

    - name: Test ACE
      run: pytest --cov=mlptrain -k "not test_openmm"

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v6
      with:
          flags: ace
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: duartegroup/mlp-train

  test-mace:
    name: MACE
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash -l {0}

    steps:
    - uses: actions/checkout@v6

    - uses: mamba-org/setup-micromamba@v3
      with:
        environment-file: environment_mace.yml
        environment-name: gha-test-env
        cache-environment: true

    - name: MACE install
      run: ./install_mace.sh

    - name: Test MACE install
      run: pytest --cov=mlptrain

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v6
      with:
          flags: mace
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: duartegroup/mlp-train
