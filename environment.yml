# Usage: mamba env create -n myenvname -f environment.yml
---
name: mlptrain
channels:
  - conda-forge
dependencies:
  - python=3.11
  - libgfortran=14.*
  - pip
  - ase
  - autode=1.4.5
  - coloredlogs
  - cython
  - dscribe=2.0
  - matplotlib-base
  - numpy<2
  - py-plumed
  - scipy
  - xtb
  - scikit-learn
  - pip:
    - quippy-ase # GAP
    - ase@git+https://gitlab.com/ase/ase.git@f2615a6e9a # For PLUMED
